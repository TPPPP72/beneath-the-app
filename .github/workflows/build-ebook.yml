name: Build Ebook

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run build script
      run: |
        python build.py

    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ebook-pdf-artifact
        path: build/book.pdf